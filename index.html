// ── Firestore helpers ──────────────────────────────────────────
async function seedIfEmpty() {
  const snap = await db.collection('characters').limit(1).get();
  if (!snap.empty) return;
  const batch = db.batch();
  [...SEED_REC.map(c=>({...c,source:'recruitable'})),
   ...SEED_NR.map(c=>({...c,source:'non-recruitable'}))]
    .forEach(c => {
      const ref = db.collection('characters').doc(c.name);
      batch.set(ref, c);
    });
  await batch.commit();
}

async function fsAddChar(char) {
  await db.collection('characters').doc(char.name).set(char);
}

async function fsUpdateRelations(nameA, nameB, action) {
  // action: 'add' | 'remove'
  const snapA = await db.collection('characters').doc(nameA).get();
  const snapB = await db.collection('characters').doc(nameB).get();
  if (!snapA.exists || !snapB.exists) return;
  const dataA = snapA.data();
  const dataB = snapB.data();
  let relA = dataA.relations || [];
  let relB = dataB.relations || [];
  if (action === 'add') {
    if (!relA.includes(nameB)) relA = [...relA, nameB];
    if (!relB.includes(nameA)) relB = [...relB, nameA];
  } else {
    relA = relA.filter(r => r !== nameB);
    relB = relB.filter(r => r !== nameA);
  }
  const batch = db.batch();
  batch.update(db.collection('characters').doc(nameA), { relations: relA });
  batch.update(db.collection('characters').doc(nameB), { relations: relB });
  await batch.commit();
}

function App() {
  const [characters, setCharacters] = useState(null); // null = loading
  const [connected, setConnected] = useState(false);
  const [tab, setTab] = useState(0);
  const [addingRel, setAddingRel] = useState(null);
  const [relSearch, setRelSearch] = useState('');
  const [showAddModal, setShowAddModal] = useState(false);
  const inputRef = useRef(null);
  const wrapRef = useRef(null);

  // Real-time listener
  useEffect(() => {
    seedIfEmpty().catch(console.error);
    const unsub = db.collection('characters').onSnapshot(
      snap => {
        const docs = snap.docs.map(d => d.data());
        setCharacters(docs);
        setConnected(true);
      },
      err => { console.error(err); setConnected(false); }
    );
    return unsub;
  }, []);

  useEffect(() => {
    if (addingRel && inputRef.current) inputRef.current.focus();
  }, [addingRel]);

  useEffect(() => {
    const handler = e => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) {
        setAddingRel(null); setRelSearch('');
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const rec  = useMemo(() => (characters||[]).filter(c=>c.source==='recruitable'), [characters]);
  const nrec = useMemo(() => (characters||[]).filter(c=>c.source==='non-recruitable'), [characters]);
  const allChars = useMemo(() => [
    ...rec.map(c=>({...c,label:'可招募'})),
    ...nrec.map(c=>({...c,label:'不可招募'}))
  ], [rec, nrec]);

  const suggestions = useMemo(() => {
    if (!addingRel) return [];
    const cur = allChars.find(c=>c.name===addingRel);
    return allChars
      .filter(c=>c.name!==addingRel && !cur?.relations?.includes(c.name))
      .filter(c=>!relSearch||c.name.includes(relSearch))
      .slice(0,12);
  }, [addingRel, relSearch, allChars]);

  const charIndexGroups = useMemo(() => {
    const sorted = [...allChars].sort((a,b)=>{
      if (a.race!==b.race) return a.race.localeCompare(b.race,'zh');
      if (a.faction!==b.faction) return a.faction.localeCompare(b.faction,'zh');
      return a.name.localeCompare(b.name,'zh');
    });
    const g = {};
    sorted.forEach(c=>{ if(!g[c.race]) g[c.race]=[]; g[c.race].push(c); });
    return g;
  }, [allChars]);

  const handleAddRel = async (charName, relName) => {
    if (!charName||!relName||charName===relName) return;
    setAddingRel(null); setRelSearch('');
    await fsUpdateRelations(charName, relName, 'add');
  };

  const handleRemoveRel = async (charName, relName) => {
    await fsUpdateRelations(charName, relName, 'remove');
  };

  function RelTags({char}) {
    return (
      <div className="rel-wrap" ref={addingRel===char.name ? wrapRef : null}>
        {(char.relations||[]).map(rel=>(
          <span key={rel} className="tag">
            {rel}
            <button className="tag-del" onClick={()=>handleRemoveRel(char.name,rel)}>×</button>
          </span>
        ))}
        {addingRel===char.name ? (
          <div style={{position:'relative'}}>
            <input ref={inputRef} className="rel-input" value={relSearch}
              onChange={e=>setRelSearch(e.target.value)}
              onKeyDown={e=>{
                if(e.key==='Escape'){setAddingRel(null);setRelSearch('');}
                if(e.key==='Enter'&&suggestions.length>0) handleAddRel(char.name,suggestions[0].name);
              }}
              placeholder="搜尋角色名稱…" />
            {suggestions.length>0&&(
              <div className="dropdown">
                {suggestions.map(s=>(
                  <div key={s.name} className="dd-item"
                    onMouseDown={e=>{e.preventDefault();handleAddRel(char.name,s.name);}}>
                    <span>{s.name}</span>
                    <span className={s.label==='可招募'?'badge-r':'badge-nr'}>{s.label}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ):(
          <button className="add-btn" onClick={()=>{setAddingRel(char.name);setRelSearch('');}}>＋</button>
        )}
      </div>
    );
  }

  function DataTable({chars}) {
    return (
      <div className="scroll-x">
        <table>
          <thead>
            <tr>{['名字','種族','個性（相適性）','派系','年齡','職業（棋種）','角色設定文本連結','關聯角色'].map(h=><th key={h}>{h}</th>)}</tr>
          </thead>
          <tbody>
            {chars.map(char=>(
              <tr key={char.name}>
                <td style={{fontWeight:'600',whiteSpace:'nowrap'}}>{char.name}</td>
                <td style={{textAlign:'center'}}>
                  <span style={{background:RACE_COLORS[char.race]||'#F5F5F5',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{char.race}</span>
                </td>
                <td style={{textAlign:'center',fontSize:'12px'}}>{char.personality}</td>
                <td style={{textAlign:'center',fontSize:'12px'}}>{char.faction}</td>
                <td style={{textAlign:'center',fontSize:'12px'}}>{char.age}</td>
                <td style={{textAlign:'center',fontSize:'12px'}}>{char.job}</td>
                <td style={{fontSize:'11px',color:'#2563EB',maxWidth:'130px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={char.textLink}>{char.textLink}</td>
                <td><RelTags char={char}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  function RelationIndex() {
    return (
      <div className="scroll-x">
        <table>
          <thead>
            <tr><th>名字</th><th>來源</th>{[1,2,3,4,5,6].map(n=><th key={n}>關聯角色{n}</th>)}</tr>
          </thead>
          <tbody>
            {allChars.map(char=>(
              <tr key={char.name}>
                <td style={{fontWeight:'600',whiteSpace:'nowrap'}}>{char.name}</td>
                <td style={{textAlign:'center'}}>
                  <span className={char.label==='可招募'?'badge-r':'badge-nr'}
                    style={{padding:'2px 8px',borderRadius:'12px',fontWeight:'bold',fontSize:'11px'}}>
                    {char.label}
                  </span>
                </td>
                {[0,1,2,3,4,5].map(idx=>(
                  <td key={idx} style={{textAlign:'center',color:(char.relations||[])[idx]?'#1F4E79':'#BFBFBF',fontSize:'12px'}}>
                    {(char.relations||[])[idx]||'—'}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  function CharIndex() {
    return (
      <div>
        {Object.entries(charIndexGroups).map(([race,chars])=>(
          <div key={race} style={{marginBottom:'16px',borderRadius:'6px',overflow:'hidden',border:'1px solid #D1D9E6'}}>
            <div className="group-hdr" style={{background:RACE_COLORS[race]||'#F5F5F5'}}>
              ▌ {race}
              <span style={{color:'#6B7280',fontWeight:'normal',fontSize:'11px'}}>（{chars.length} 人）</span>
            </div>
            <div className="scroll-x">
              <table style={{minWidth:'500px'}}>
                <thead><tr style={{background:'#2E75B6'}}>{['名字','派系','年齡','職業（棋種）','招募狀態'].map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>
                  {chars.map(char=>(
                    <tr key={char.name}>
                      <td style={{fontWeight:'600'}}>{char.name}</td>
                      <td style={{textAlign:'center',fontSize:'12px'}}>{char.faction}</td>
                      <td style={{textAlign:'center',fontSize:'12px'}}>{char.age}</td>
                      <td style={{textAlign:'center',fontSize:'12px'}}>{char.job}</td>
                      <td style={{textAlign:'center'}}>
                        <span className={char.label==='可招募'?'badge-r':'badge-nr'}
                          style={{padding:'2px 8px',borderRadius:'12px',fontWeight:'bold',fontSize:'11px'}}>
                          {char.label}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        ))}
      </div>
    );
  }

  if (characters === null) {
    return (
      <div className="loading-screen">
        <div className="spinner"/>
        <div style={{fontSize:'15px',fontWeight:'bold'}}>連接雲端資料庫中…</div>
        <div style={{fontSize:'12px',color:'#6B7280'}}>首次載入需要幾秒鐘</div>
      </div>
    );
  }

  const TABS = ['可招募角色','不可招募角色','關聯角色索引','角色索引清單'];
  const COUNTS = [rec.length, nrec.length, allChars.length, allChars.length];

  return (
    <div style={{minHeight:'100vh',background:'#F0F4FB'}}>
      {showAddModal && <AddCharModal allChars={allChars} onClose={()=>setShowAddModal(false)}/>}

      <div style={{background:'linear-gradient(135deg,#1F4E79,#2E75B6)',color:'white',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px'}}>
        <div>
          <div style={{fontSize:'18px',fontWeight:'bold'}}>🎮 遊戲角色管理系統</div>
          <div style={{fontSize:'12px',opacity:0.8,marginTop:'3px',display:'flex',alignItems:'center',gap:'6px'}}>
            <span className={`sync-dot ${connected?'sync-on':'sync-off'}`}/>
            {connected ? '已連接雲端・所有裝置即時同步' : '連線中斷，請重新整理'}
            <span style={{opacity:0.6}}>· 共 {allChars.length} 位角色</span>
          </div>
        </div>
        <button className="new-char-btn" onClick={()=>setShowAddModal(true)}>＋ 新增角色</button>
      </div>

      <div style={{background:'white',borderBottom:'2px solid #E5E7EB',display:'flex',overflowX:'auto'}}>
        {TABS.map((label,i)=>(
          <button key={i} className={`tab-btn ${tab===i?'active':''}`} onClick={()=>setTab(i)}>
            {label}
            <span style={{marginLeft:'5px',fontSize:'11px',background:tab===i?'#1F4E79':'#E5E7EB',color:tab===i?'white':'#6B7280',borderRadius:'10px',padding:'1px 7px'}}>
              {COUNTS[i]}
            </span>
          </button>
        ))}
      </div>

      {(tab===0||tab===1)&&(
        <div className="hint-bar">
          <span>💡</span>
          <span>點 <strong>＋</strong> 新增關聯（可招募 ＆ 不可招募都能選），點 <strong>×</strong> 刪除。操作後<strong>雙向自動同步</strong>並即時寫入雲端，任何裝置重新整理都是最新資料。</span>
        </div>
      )}

      <div style={{padding:'16px'}}>
        {tab===0&&<DataTable chars={rec}/>}
        {tab===1&&<DataTable chars={nrec}/>}
        {tab===2&&<RelationIndex/>}
        {tab===3&&<CharIndex/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
