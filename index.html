// ── Firebase helpers ─────────────────────────────────────────────
async function seedIfEmpty(){
  const s=await db.collection('characters').limit(1).get();
  if(!s.empty)return;
  const b=db.batch();
  SEED.forEach(c=>b.set(db.collection('characters').doc(c.name),c));
  await b.commit();
}

async function fsUpdateRelations(nameA,nameB,action,setChars){
  setChars(prev=>prev.map(c=>{
    if(c.name===nameA||c.name===nameB){
      const other=c.name===nameA?nameB:nameA;
      let rels=c.relations||[];
      rels=action==='add'?(rels.includes(other)?rels:[...rels,other]):rels.filter(r=>r!==other);
      return{...c,relations:rels};
    }
    return c;
  }));
  try{
    const[sA,sB]=await Promise.all([db.collection('characters').doc(nameA).get(),db.collection('characters').doc(nameB).get()]);
    if(!sA.exists||!sB.exists)return;
    let rA=sA.data().relations||[],rB=sB.data().relations||[];
    if(action==='add'){if(!rA.includes(nameB))rA=[...rA,nameB];if(!rB.includes(nameA))rB=[...rB,nameA];}
    else{rA=rA.filter(r=>r!==nameB);rB=rB.filter(r=>r!==nameA);}
    const b=db.batch();
    b.update(db.collection('characters').doc(nameA),{relations:rA});
    b.update(db.collection('characters').doc(nameB),{relations:rB});
    await b.commit();
  }catch(e){console.error(e);}
}

async function fsAddChar(char,setChars){
  setChars(prev=>[...prev,char]);
  db.collection('characters').doc(char.name).set(char).catch(console.error);
}

async function fsUpdateChar(oldName,newName,updates,setChars){
  const nameChanged=oldName!==newName;
  setChars(prev=>prev.map(c=>{
    if(c.name===oldName)return{...c,...updates,name:newName};
    if(nameChanged)return{...c,relations:(c.relations||[]).map(r=>r===oldName?newName:r)};
    return c;
  }));
  try{
    if(nameChanged){
      const snap=await db.collection('characters').doc(oldName).get();
      if(!snap.exists)return;
      const b=db.batch();
      b.delete(db.collection('characters').doc(oldName));
      b.set(db.collection('characters').doc(newName),{...snap.data(),...updates,name:newName});
      const relSnap=await db.collection('characters').where('relations','array-contains',oldName).get();
      relSnap.docs.forEach(d=>{if(d.id!==oldName)b.update(d.ref,{relations:d.data().relations.map(r=>r===oldName?newName:r)});});
      await b.commit();
    }else{
      await db.collection('characters').doc(oldName).update(updates);
    }
  }catch(e){console.error(e);}
}

async function fsDeleteChar(name,setChars){
  setChars(prev=>prev.filter(c=>c.name!==name).map(c=>({...c,relations:(c.relations||[]).filter(r=>r!==name)})));
  try{
    const b=db.batch();
    b.delete(db.collection('characters').doc(name));
    const s=await db.collection('characters').where('relations','array-contains',name).get();
    s.docs.forEach(d=>b.update(d.ref,{relations:d.data().relations.filter(r=>r!==name)}));
    await b.commit();
  }catch(e){console.error(e);}
}

// ── Force layout ─────────────────────────────────────────────────
function computeLayout(nodes,edges,W,H){
  if(!nodes.length)return{};
  let pos={};
  nodes.forEach((n,i)=>{
    const a=(2*Math.PI*i)/nodes.length-Math.PI/2;
    const r=Math.min(W,H)*0.44;
    pos[n]={x:W/2+r*Math.cos(a),y:H/2+r*Math.sin(a)};
  });
  let vel=Object.fromEntries(nodes.map(n=>[n,{x:0,y:0}]));
  for(let t=0;t<350;t++){
    const f=Object.fromEntries(nodes.map(n=>[n,{x:0,y:0}]));
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        const dx=pos[b].x-pos[a].x,dy=pos[b].y-pos[a].y;
        const d=Math.max(Math.sqrt(dx*dx+dy*dy),1);
        const fo=7000/(d*d);
        f[a].x-=fo*dx/d;f[a].y-=fo*dy/d;
        f[b].x+=fo*dx/d;f[b].y+=fo*dy/d;
      }
    }
    edges.forEach(([a,b])=>{
      if(!pos[a]||!pos[b])return;
      const dx=pos[b].x-pos[a].x,dy=pos[b].y-pos[a].y;
      const d=Math.max(Math.sqrt(dx*dx+dy*dy),1);
      const fo=0.03*(d-160);
      f[a].x+=fo*dx/d;f[a].y+=fo*dy/d;
      f[b].x-=fo*dx/d;f[b].y-=fo*dy/d;
    });
    nodes.forEach(n=>{f[n].x+=0.02*(W/2-pos[n].x);f[n].y+=0.02*(H/2-pos[n].y);});
    nodes.forEach(n=>{
      vel[n].x=(vel[n].x+f[n].x)*0.80;vel[n].y=(vel[n].y+f[n].y)*0.80;
      pos[n]={x:Math.max(70,Math.min(W-70,pos[n].x+vel[n].x*0.25)),y:Math.max(60,Math.min(H-60,pos[n].y+vel[n].y*0.25))};
    });
  }
  return pos;
}

      <div className="fg" style={{marginBottom:0}}><label>派系</label><select value={form.faction} onChange={e=>s('faction',e.target.value)}>{FACTIONS.map(f=><option key={f}>{f}</option>)}</select></div>
    </div>
    <div style={{marginBottom:'12px'}}/>
    <div className="fg"><label>身分別</label><input value={form.identity||''} onChange={e=>s('identity',e.target.value)} placeholder="例：庫斯托家族、預言家…"/></div>
    <div style={{marginBottom:'12px'}}/>
    <div className="form-row">
      <div className="fg" style={{marginBottom:0}}><label>個性（相適性）</label><select value={form.personality} onChange={e=>s('personality',e.target.value)}>{PERSONALITIES.map(p=><option key={p} value={p}>{p||'（未填）'}</option>)}</select></div>

    <div className="form-row">
      <div className="fg" style={{marginBottom:0}}><label>職業（棋種）</label><select value={form.job} onChange={e=>s('job',e.target.value)}>{JOBS.map(j=><option key={j}>{j}</option>)}</select></div>
      <div className="fg" style={{marginBottom:0}}><label>角色設定文本連結</label><input value={form.textLink} onChange={e=>s('textLink',e.target.value)} placeholder="文件名稱"/></div>

// ── Add modal ────────────────────────────────────────────────────
function AddCharModal({allChars,setChars,onClose}){
  const[form,setForm]=useState({name:'',race:'人類',personality:'',faction:'教會',age:'',job:'騎士',textLink:'',identity:'',source:'recruitable'});
  const[err,setErr]=useState('');
  const submit=()=>{
    const name=form.name.trim();
    if(!name){setErr('請輸入角色名稱');return;}
    if(allChars.some(c=>c.name===name)){setErr('此角色名稱已存在');return;}
    fsAddChar({...form,name,relations:[]},setChars);
    onClose();
  };
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h2>✨ 新增角色</h2>
      <div className="fg"><label>角色名稱 <span className="required">*</span></label><input value={form.name} onChange={e=>{setForm(f=>({...f,name:e.target.value}));setErr('');}} placeholder="輸入角色名稱" autoFocus/>{err&&<div className="err">{err}</div>}</div>
      <div className="fg"><label>招募狀態 <span className="required">*</span></label><select value={form.source} onChange={e=>setForm(f=>({...f,source:e.target.value}))}><option value="recruitable">可招募</option><option value="non-recruitable">不可招募</option></select></div>
      <CharFormFields form={form} onChange={setForm}/>
      <div style={{marginTop:'20px',display:'flex',gap:'10px',justifyContent:'flex-end'}}>
        <button className="btn-secondary" onClick={onClose}>取消</button>
        <button className="btn-primary" onClick={submit}>✅ 新增角色</button>
      </div>
    </div>
  </div>);
}

// ── Edit modal ───────────────────────────────────────────────────
function EditCharModal({char,allChars,setChars,onClose}){
  const[form,setForm]=useState({name:char.name,race:char.race||'人類',personality:char.personality||'',faction:char.faction||'教會',age:char.age||'',job:char.job||'騎士',textLink:char.textLink||'',identity:char.identity||'',source:char.source||'recruitable'});
  const[err,setErr]=useState('');
  const nameChanged=form.name.trim()!==char.name;
  const submit=()=>{
    const newName=form.name.trim();
    if(!newName){setErr('角色名稱不能為空');return;}
    if(nameChanged&&allChars.some(c=>c.name===newName)){setErr('此名稱已有其他角色使用');return;}
    const{name,...updates}=form;
    fsUpdateChar(char.name,newName,{...updates,name:newName},setChars);
    onClose();
  };
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h2>✏️ 編輯角色</h2>
      <div className="fg">
        <label>角色名稱 <span className="required">*</span></label>
        <input value={form.name} onChange={e=>{setForm(f=>({...f,name:e.target.value}));setErr('');}}/>
        {nameChanged&&<div className="warn-box">⚠️ 更改名稱後，所有關聯此角色的關係也會自動同步更新。</div>}
        {err&&<div className="err">{err}</div>}
      </div>
      <div className="fg"><label>招募狀態</label><select value={form.source} onChange={e=>setForm(f=>({...f,source:e.target.value}))}><option value="recruitable">可招募</option><option value="non-recruitable">不可招募</option></select></div>
      <CharFormFields form={form} onChange={setForm}/>
      <div style={{marginTop:'20px',display:'flex',gap:'10px',justifyContent:'flex-end'}}>
        <button className="btn-secondary" onClick={onClose}>取消</button>
        <button className="btn-primary" onClick={submit}>💾 儲存變更</button>
      </div>
    </div>
  </div>);
}

// ── Delete confirm modal ─────────────────────────────────────────
function DeleteConfirmModal({char,setChars,onClose}){
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={{maxWidth:'380px'}}>
      <h2>🗑️ 確認刪除</h2>
      <p style={{fontSize:'14px',color:'#374151',lineHeight:'1.6',margin:'12px 0 20px'}}>
        確定要刪除角色 <strong style={{color:'#DC2626'}}>「{char.name}」</strong> 嗎？<br/>
        <span style={{fontSize:'12px',color:'#6B7280'}}>此角色的所有關聯資料也會一併移除，此操作無法復原。</span>
      </p>
      <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
        <button className="btn-secondary" onClick={onClose}>取消</button>
        <button className="btn-danger" onClick={()=>{fsDeleteChar(char.name,setChars);onClose();}}>確認刪除</button>
      </div>
    </div>
  </div>);
}

// ── RelTags ──────────────────────────────────────────────────────
function RelTags({char,allChars,setChars,addingRel,setAddingRel}){
  const[search,setSearch]=useState('');
  const[composing,setComposing]=useState(false);
  const inputRef=useRef(null);
  const wrapRef=useRef(null);
  const isOpen=addingRel===char.name;
  useEffect(()=>{if(isOpen&&inputRef.current)inputRef.current.focus();},[isOpen]);
  useEffect(()=>{if(!isOpen)setSearch('');},[isOpen]);
  useEffect(()=>{
    const h=e=>{if(isOpen&&wrapRef.current&&!wrapRef.current.contains(e.target))setAddingRel(null);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[isOpen]);
  const suggestions=useMemo(()=>{
    const ex=char.relations||[];
    return allChars.filter(c=>c.name!==char.name&&!ex.includes(c.name)).filter(c=>!search||c.name.includes(search)).sort((a,b)=>a.source==='recruitable'&&b.source!=='recruitable'?-1:a.source!=='recruitable'&&b.source==='recruitable'?1:a.name.localeCompare(b.name,'zh'));
  },[char,allChars,search]);
  const handleAdd=r=>{setAddingRel(null);fsUpdateRelations(char.name,r,'add',setChars);};
  const handleRemove=r=>fsUpdateRelations(char.name,r,'remove',setChars);
  return(<div className="rel-wrap" ref={isOpen?wrapRef:null}>
    {(char.relations||[]).map(r=><span key={r} className="tag">{r}<button className="tag-del" onClick={()=>handleRemove(r)}>×</button></span>)}
    {isOpen?(<div style={{position:'relative'}}>
      <input ref={inputRef} className="rel-input" value={search} onChange={e=>setSearch(e.target.value)}
        onCompositionStart={()=>setComposing(true)} onCompositionEnd={e=>{setComposing(false);setSearch(e.target.value);}}
        onKeyDown={e=>{if(e.key==='Escape')setAddingRel(null);if(e.key==='Enter'&&!composing&&suggestions.length>0)handleAdd(suggestions[0].name);}}
        placeholder="搜尋角色名稱…"/>
      <div className="dropdown">
        {suggestions.length===0?<div className="dd-empty">找不到符合的角色</div>:suggestions.map(s=>(
          <div key={s.name} className="dd-item" onMouseDown={e=>{e.preventDefault();handleAdd(s.name);}}>
            <span>{s.name}</span><span className={s.source==='recruitable'?'badge-r':'badge-nr'}>{s.source==='recruitable'?'可招募':'不可招募'}</span>
          </div>
        ))}
      </div>
    </div>):(<button className="add-btn" onClick={()=>setAddingRel(char.name)}>＋</button>)}
  </div>);
}

// ── Network Graph ────────────────────────────────────────────────
function NetworkGraph({allChars}){
  const[positions,setPositions]=useState({});
  const[filterText,setFilterText]=useState('');
  const[hovered,setHovered]=useState(null);
  const[transform,setTransform]=useState({x:0,y:0,scale:1});
  const isDragging=useRef(false);
  const dragStart=useRef({x:0,y:0,tx:0,ty:0});
  const containerRef=useRef(null);
  const W=1000,H=680;

  const edges=useMemo(()=>{
    const seen=new Set(),res=[];
    allChars.forEach(c=>(c.relations||[]).forEach(r=>{const k=[c.name,r].sort().join('|||');if(!seen.has(k)){seen.add(k);res.push([c.name,r]);}}));
    return res;
  },[allChars]);

  const dataKey=useMemo(()=>allChars.map(c=>c.name).sort().join(',')+'/'+edges.map(e=>e.join('-')).join(','),[allChars,edges]);

  useEffect(()=>{
    if(!allChars.length)return;
    const pos=computeLayout(allChars.map(c=>c.name),edges,W,H);
    setPositions(pos);
  },[dataKey]);

  // Active nodes for filter/hover
  const activeSet=useMemo(()=>{
    const src=filterText||hovered;
    if(!src)return null;
    const match=allChars.filter(c=>c.name.includes(src)).map(c=>c.name);
    const s=new Set(match);
    match.forEach(n=>{const c=allChars.find(x=>x.name===n);(c?.relations||[]).forEach(r=>s.add(r));});
    return s;
  },[filterText,hovered,allChars]);

  // Wheel zoom toward cursor
  useEffect(()=>{
    const el=containerRef.current;
    if(!el)return;
    const handler=e=>{
      e.preventDefault();
      const rect=el.getBoundingClientRect();
      const mx=e.clientX-rect.left,my=e.clientY-rect.top;
      const delta=e.deltaY>0?0.87:1.15;
      setTransform(t=>{
        const ns=Math.max(0.2,Math.min(5,t.scale*delta));
        const sf=ns/t.scale;
        return{x:mx-sf*(mx-t.x),y:my-sf*(my-t.y),scale:ns};
      });
    };
    el.addEventListener('wheel',handler,{passive:false});
    return()=>el.removeEventListener('wheel',handler);
  },[]);

  const onMouseDown=e=>{
    if(e.button!==0)return;
    if(e.target.closest('.node-g'))return;
    isDragging.current=true;
    dragStart.current={x:e.clientX-transform.x,y:e.clientY-transform.y};
  };
  const onMouseMove=e=>{if(!isDragging.current)return;setTransform(t=>({...t,x:e.clientX-dragStart.current.x,y:e.clientY-dragStart.current.y}));};
  const onMouseUp=()=>{isDragging.current=false;};

  const NR=13;
  const shortName=n=>n.length>4?n.slice(0,3)+'…':n;

  return(<div className="net-container">
    <div className="net-toolbar">
      <span style={{fontSize:'13px',fontWeight:'bold',color:'#1F4E79'}}>🕸️ 關係網絡圖</span>
      <span style={{fontSize:'12px',color:'#6B7280'}}>{allChars.length} 位角色・{edges.length} 條關聯</span>
      <input className="net-search" value={filterText} onChange={e=>setFilterText(e.target.value)}
        placeholder="🔍 搜尋角色名稱，高亮顯示關係"/>
      <button className="btn-secondary" style={{padding:'6px 12px',fontSize:'12px'}} onClick={()=>{setTransform({x:0,y:0,scale:1});setFilterText('');}}>重置視角</button>
      <div style={{display:'flex',gap:'14px',fontSize:'11px',marginLeft:'auto',alignItems:'center'}}>
        <span><span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:'#2563EB',marginRight:4,verticalAlign:'middle'}}/>可招募</span>
        <span><span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:'#C2410C',marginRight:4,verticalAlign:'middle'}}/>不可招募</span>
      </div>
    </div>
    <div ref={containerRef} className={`net-svg-wrap${isDragging.current?' dragging':''}`}
      onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
      <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block'}}>
        <g transform={`translate(${transform.x},${transform.y}) scale(${transform.scale})`}>
          {/* Edges */}
          {edges.map(([a,b])=>{
            if(!positions[a]||!positions[b])return null;
            const active=!activeSet||(activeSet.has(a)&&activeSet.has(b));
            return<line key={`${a}-${b}`} x1={positions[a].x} y1={positions[a].y} x2={positions[b].x} y2={positions[b].y}
              stroke={active?'#64748B':'#CBD5E1'} strokeWidth={active?1.8:1} opacity={active?0.7:0.12}/>;
          })}
          {/* Nodes */}
          {allChars.map(char=>{
            const p=positions[char.name];
            if(!p)return null;
            const isRec=char.source==='recruitable';
            const isHov=hovered===char.name;
            const inActive=!activeSet||activeSet.has(char.name);
            const fill=isRec?'#2563EB':'#C2410C';
            const hl=isHov||(activeSet&&activeSet.has(char.name)&&filterText);
            return(<g key={char.name} className="node-g" transform={`translate(${p.x},${p.y})`}
              style={{cursor:'default'}}
              onMouseEnter={()=>setHovered(char.name)} onMouseLeave={()=>setHovered(null)}>
              {hl&&<circle r={NR+5} fill="none" stroke="#FBBF24" strokeWidth="3" opacity="0.8"/>}
              <circle r={isHov?NR+2:NR} fill={fill} stroke="white" strokeWidth="2"
                opacity={inActive?1:0.12} style={{transition:'r 0.1s'}}/>
              <text textAnchor="middle" dominantBaseline="middle" fontSize="8"
                fill="white" fontWeight="bold" opacity={inActive?1:0.12} style={{pointerEvents:'none'}}>
                {shortName(char.name)}
              </text>
              <text textAnchor="middle" y={NR+14} fontSize="10" fill={inActive?'#1E3A5F':'#CBD5E1'}
                fontWeight={isHov?'bold':'normal'} style={{pointerEvents:'none'}}>
                {isHov&&char.name.length>5?char.name:shortName(char.name)}
              </text>
              {isHov&&char.name.length>5&&(
                <text textAnchor="middle" y={NR+25} fontSize="9" fill="#475569" style={{pointerEvents:'none'}}>
                  {char.name.slice(4)}
                </text>
              )}
            </g>);
          })}
        </g>
      </svg>
      <div className="net-hint">滾輪縮放・拖曳移動</div>
    </div>
  </div>);
}

// ── Main App ─────────────────────────────────────────────────────
function App(){
  const[characters,setCharacters]=useState(null);
  const[connected,setConnected]=useState(false);
  const[tab,setTab]=useState(0);
  const[addingRel,setAddingRel]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[editChar,setEditChar]=useState(null);
  const[deleteChar,setDeleteChar]=useState(null);

  useEffect(()=>{
    seedIfEmpty().catch(console.error);
    return db.collection('characters').onSnapshot(
      s=>{setCharacters(s.docs.map(d=>d.data()));setConnected(true);},
      e=>{console.error(e);setConnected(false);}
    );
  },[]);

  const allChars=useMemo(()=>characters||[],[characters]);
  const rec=useMemo(()=>allChars.filter(c=>c.source==='recruitable'),[allChars]);
  const nrec=useMemo(()=>allChars.filter(c=>c.source==='non-recruitable'),[allChars]);
  const lbl=c=>c.source==='recruitable'?'可招募':'不可招募';

  function DataTable({chars}){
    return(<div className="scroll-x"><table>
      <thead><tr>{['名字','種族','身分別','個性','派系','年齡','職業','文本連結','關聯角色','操作'].map(h=><th key={h}>{h}</th>)}</tr></thead>
      <tbody>{chars.map(char=>(
        <tr key={char.name}>
          <td style={{fontWeight:'600',whiteSpace:'nowrap'}}>{char.name}</td>
          <td style={{textAlign:'center'}}><span style={{background:RACE_COLORS[char.race]||'#F5F5F5',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{char.race}</span></td>
          <td style={{textAlign:'center',fontSize:'12px',color:'#374151'}}>{char.identity||''}</td>
          <td style={{textAlign:'center',fontSize:'12px'}}>{char.personality}</td>
          <td style={{textAlign:'center',fontSize:'12px'}}>{char.faction}</td>
          <td style={{textAlign:'center',fontSize:'12px'}}>{char.age}</td>
          <td style={{textAlign:'center',fontSize:'12px'}}>{char.job}</td>
          <td style={{fontSize:'11px',color:'#2563EB',maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={char.textLink}>{char.textLink}</td>
          <td><RelTags char={char} allChars={allChars} setChars={setCharacters} addingRel={addingRel} setAddingRel={setAddingRel}/></td>
          <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
            <button className="icon-btn edit" title="編輯" onClick={()=>setEditChar(char)}>✏️</button>
            <button className="icon-btn del" title="刪除" onClick={()=>setDeleteChar(char)}>🗑️</button>
          </td>
        </tr>
      ))}</tbody>
    </table></div>);
  }

  function RelIndex(){
    const maxRel=Math.max(1,...allChars.map(c=>(c.relations||[]).length));
    const cols=Array.from({length:maxRel},(_,i)=>i);
    return(<div className="scroll-x"><table>
      <thead><tr><th>名字</th><th>來源</th>{cols.map(i=><th key={i}>關聯角色{i+1}</th>)}</tr></thead>
      <tbody>{allChars.map(char=>(
        <tr key={char.name}>
          <td style={{fontWeight:'600',whiteSpace:'nowrap'}}>{char.name}</td>
          <td style={{textAlign:'center'}}><span className={char.source==='recruitable'?'badge-r':'badge-nr'} style={{padding:'2px 8px',borderRadius:'12px',fontWeight:'bold',fontSize:'11px'}}>{lbl(char)}</span></td>
          {cols.map(i=><td key={i} style={{textAlign:'center',color:(char.relations||[])[i]?'#1F4E79':'#BFBFBF',fontSize:'12px',whiteSpace:'nowrap'}}>{(char.relations||[])[i]||'—'}</td>)}
        </tr>
      ))}</tbody>
    </table></div>);
  }

  if(characters===null)return(<div className="loading-screen"><div className="spinner"/><div style={{fontSize:'15px',fontWeight:'bold'}}>連接雲端資料庫中…</div></div>);

  const TABS=['可招募角色','不可招募角色','關聯角色索引','關係網絡圖'];
  const COUNTS=[rec.length,nrec.length,allChars.length,allChars.length];

  return(<div style={{minHeight:'100vh',background:'#F0F4FB'}}>
    {showAdd&&<AddCharModal allChars={allChars} setChars={setCharacters} onClose={()=>setShowAdd(false)}/>}
    {editChar&&<EditCharModal char={editChar} allChars={allChars} setChars={setCharacters} onClose={()=>setEditChar(null)}/>}
    {deleteChar&&<DeleteConfirmModal char={deleteChar} setChars={setCharacters} onClose={()=>setDeleteChar(null)}/>}

    <div style={{background:'linear-gradient(135deg,#1F4E79,#2E75B6)',color:'white',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px'}}>
      <div>
        <div style={{fontSize:'18px',fontWeight:'bold'}}>🎮 遊戲角色管理系統</div>
        <div style={{fontSize:'12px',opacity:0.8,marginTop:'3px',display:'flex',alignItems:'center',gap:'6px'}}>
          <span className={`sync-dot ${connected?'sync-on':'sync-off'}`}/>
          {connected?'已連接雲端・即時同步':'連線中斷，請重新整理'}
          <span style={{opacity:0.6}}>· 共 {allChars.length} 位角色</span>
        </div>
      </div>
      <button className="new-char-btn" onClick={()=>setShowAdd(true)}>＋ 新增角色</button>
    </div>

    <div style={{background:'white',borderBottom:'2px solid #E5E7EB',display:'flex',overflowX:'auto'}}>
      {TABS.map((label,i)=>(
        <button key={i} className={`tab-btn ${tab===i?'active':''}`} onClick={()=>setTab(i)}>
          {label}<span style={{marginLeft:'5px',fontSize:'11px',background:tab===i?'#1F4E79':'#E5E7EB',color:tab===i?'white':'#6B7280',borderRadius:'10px',padding:'1px 7px'}}>{COUNTS[i]}</span>
        </button>
      ))}
    </div>

    {(tab===0||tab===1)&&<div className="hint-bar"><span>💡</span><span>點 <strong>✏️</strong> 編輯角色資料，點 <strong>🗑️</strong> 刪除（刪除前會再次確認）。關聯欄點 <strong>＋</strong> 新增、<strong>×</strong> 刪除，支援中文搜尋，雙向自動同步。</span></div>}

    <div style={{padding:'16px'}}>
      {tab===0&&<DataTable chars={rec}/>}
      {tab===1&&<DataTable chars={nrec}/>}
      {tab===2&&<RelIndex/>}
      {tab===3&&<NetworkGraph allChars={allChars}/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
