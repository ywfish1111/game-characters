async function seedIfEmpty() {
  const snap = await db.collection('characters').limit(1).get();
  if (!snap.empty) return;
  const batch = db.batch();
  SEED.forEach(c => batch.set(db.collection('characters').doc(c.name), c));
  await batch.commit();
}

// ── Optimistic relation update ─────────────────────────────────
async function fsUpdateRelations(nameA, nameB, action, setChars) {
  // Optimistic update first
  setChars(prev => {
    const next = prev.map(c => {
      if (c.name === nameA || c.name === nameB) {
        const other = c.name === nameA ? nameB : nameA;
        let rels = c.relations || [];
        if (action === 'add') {
          rels = rels.includes(other) ? rels : [...rels, other];
        } else {
          rels = rels.filter(r => r !== other);
        }
        return {...c, relations: rels};
      }
      return c;
    });
    return next;
  });
  // Background sync
  try {
    const [snapA, snapB] = await Promise.all([
      db.collection('characters').doc(nameA).get(),
      db.collection('characters').doc(nameB).get(),
    ]);
    if (!snapA.exists || !snapB.exists) return;
    let relA = snapA.data().relations || [];
    let relB = snapB.data().relations || [];
    if (action === 'add') {
      if (!relA.includes(nameB)) relA = [...relA, nameB];
      if (!relB.includes(nameA)) relB = [...relB, nameA];
    } else {
      relA = relA.filter(r => r !== nameB);
      relB = relB.filter(r => r !== nameA);
    }
    const batch = db.batch();
    batch.update(db.collection('characters').doc(nameA), {relations: relA});
    batch.update(db.collection('characters').doc(nameB), {relations: relB});
    await batch.commit();
  } catch(e) { console.error('Sync error', e); }
}

// ── Add Character Modal ────────────────────────────────────────
function AddCharModal({ allChars, setChars, onClose }) {
  const [form, setForm] = useState({name:'',race:'人類',personality:'',faction:'教會',age:'',job:'騎士',textLink:'',source:'recruitable'});
  const [error, setError] = useState('');
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSubmit = async () => {
    const name = form.name.trim();
    if (!name) { setError('請輸入角色名稱'); return; }
    if (allChars.some(c=>c.name===name)) { setError('此角色名稱已存在'); return; }
    const newChar = {...form, name, relations:[]};
    // Optimistic: add to local state immediately
    setChars(prev => [...prev, newChar]);
    onClose();
    // Background write
    db.collection('characters').doc(name).set(newChar).catch(console.error);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <h2>✨ 新增角色</h2>
        <div className="form-group">
          <label>角色名稱 <span className="required">*</span></label>
          <input value={form.name} onChange={e=>{set('name',e.target.value);setError('');}} placeholder="輸入角色名稱" autoFocus />
          {error && <div className="error-msg">{error}</div>}
        </div>
        <div className="form-group">
          <label>招募狀態 <span className="required">*</span></label>
          <select value={form.source} onChange={e=>set('source',e.target.value)}>
            <option value="recruitable">可招募</option>
            <option value="non-recruitable">不可招募</option>
          </select>
        </div>
        <div className="form-row">
          <div className="form-group" style={{marginBottom:0}}>
            <label>種族</label>
            <select value={form.race} onChange={e=>set('race',e.target.value)}>
              {RACES.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>
          <div className="form-group" style={{marginBottom:0}}>
            <label>派系</label>
            <select value={form.faction} onChange={e=>set('faction',e.target.value)}>
              {FACTIONS.map(f=><option key={f}>{f}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:'12px'}}/>
        <div className="form-row">

  useEffect(() => {
    const handler = e => {
      if (isOpen && wrapRef.current && !wrapRef.current.contains(e.target)) {
        setAddingRel(null);
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [isOpen]);

  // 搜尋時使用已組字完成的文字（不受組字過程干擾）
  const suggestions = useMemo(() => {
    const existRels = char.relations || [];
    return allChars
      .filter(c => c.name !== char.name && !existRels.includes(c.name))
      .filter(c => !search || c.name.includes(search))
      .sort((a,b) => {
        // 可招募排前面，同類依名字排序
        if (a.source !== b.source) return a.source === 'recruitable' ? -1 : 1;
        return a.name.localeCompare(b.name, 'zh');
      });
  }, [char, allChars, search]);

  const handleAdd = (relName) => {
    setAddingRel(null);
    fsUpdateRelations(char.name, relName, 'add', setChars);
  };

  const handleRemove = (relName) => {
    fsUpdateRelations(char.name, relName, 'remove', setChars);
  };

  return (
    <div className="rel-wrap" ref={isOpen ? wrapRef : null}>
      {(char.relations||[]).map(rel=>(
        <span key={rel} className="tag">
          {rel}
          <button className="tag-del" onClick={()=>handleRemove(rel)}>×</button>
        </span>
      ))}
      {isOpen ? (
        <div style={{position:'relative'}}>
          <input
            ref={inputRef}
            className="rel-input"
            value={search}
            onChange={e => setSearch(e.target.value)}
            // 中文輸入法：組字中不篩選，組字完成才更新
            onCompositionStart={() => setComposing(true)}
            onCompositionEnd={e => { setComposing(false); setSearch(e.target.value); }}
            onKeyDown={e => {
              if (e.key==='Escape') { setAddingRel(null); }
              // 組字中不觸發 Enter 選取
              if (e.key==='Enter' && !composing && suggestions.length>0) handleAdd(suggestions[0].name);
            }}
            placeholder="搜尋角色名稱…"
          />
          <div className="dropdown">
            {suggestions.length === 0
              ? <div className="dd-empty">找不到符合的角色</div>
              : suggestions.map(s=>(
                  <div key={s.name} className="dd-item"
                    onMouseDown={e=>{ e.preventDefault(); handleAdd(s.name); }}>
                    <span>{s.name}</span>
                    <span className={s.source==='recruitable'?'badge-r':'badge-nr'}>
                      {s.source==='recruitable'?'可招募':'不可招募'}
                    </span>
                  </div>
                ))
            }
          </div>
        </div>
      ) : (
        <button className="add-btn" onClick={()=>setAddingRel(char.name)}>＋</button>
      )}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────
function App() {
  const [characters, setCharacters] = useState(null);
  const [connected, setConnected]   = useState(false);
  const [tab, setTab]               = useState(0);
  const [addingRel, setAddingRel]   = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);

  useEffect(() => {
    seedIfEmpty().catch(console.error);
    const unsub = db.collection('characters').onSnapshot(
      snap => { setCharacters(snap.docs.map(d=>d.data())); setConnected(true); },
      err  => { console.error(err); setConnected(false); }
    );
    return unsub;
  }, []);

  const allChars = useMemo(() => characters || [], [characters]);
  const rec  = useMemo(() => allChars.filter(c=>c.source==='recruitable'), [allChars]);
  const nrec = useMemo(() => allChars.filter(c=>c.source==='non-recruitable'), [allChars]);

  const charIndexGroups = useMemo(() => {
    const sorted = [...allChars].sort((a,b)=>{
      if(a.race!==b.race) return a.race.localeCompare(b.race,'zh');
      if(a.faction!==b.faction) return a.faction.localeCompare(b.faction,'zh');
      return a.name.localeCompare(b.name,'zh');
    });
    const g = {};
    sorted.forEach(c=>{ if(!g[c.race]) g[c.race]=[]; g[c.race].push(c); });
    return g;
  }, [allChars]);

  const label = c => c.source==='recruitable'?'可招募':'不可招募';

  function DataTable({chars}) {
    return (
      <div className="scroll-x">
        <table>
          <thead>
            <tr>{['名字','種族','個性（相適性）','派系','年齡','職業（棋種）','角色設定文本連結','關聯角色'].map(h=><th key={h}>{h}</th>)}</tr>
          </thead>
          <tbody>
            {chars.map(char=>(
              <tr key={char.name}>
                <td style={{fontWeight:'600',whiteSpace:'nowrap'}}>{char.name}</td>
                <td style={{textAlign:'center'}}>
                  <span style={{background:RACE_COLORS[char.race]||'#F5F5F5',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{char.race}</span>
                </td>
                <td style={{textAlign:'center',fontSize:'12px'}}>{char.personality}</td>
                <td style={{textAlign:'center',fontSize:'12px'}}>{char.faction}</td>
                <td style={{textAlign:'center',fontSize:'12px'}}>{char.age}</td>
                <td style={{textAlign:'center',fontSize:'12px'}}>{char.job}</td>
                <td style={{fontSize:'11px',color:'#2563EB',maxWidth:'130px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={char.textLink}>{char.textLink}</td>
                <td>
                  <RelTags char={char} allChars={allChars} setChars={setCharacters}
                    addingRel={addingRel} setAddingRel={setAddingRel}/>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  function RelationIndex() {
    return (
      <div className="scroll-x">
        <table>
          <thead>
            <tr><th>名字</th><th>來源</th>{[1,2,3,4,5,6].map(n=><th key={n}>關聯角色{n}</th>)}</tr>
          </thead>
          <tbody>
            {allChars.map(char=>(
              <tr key={char.name}>
                <td style={{fontWeight:'600',whiteSpace:'nowrap'}}>{char.name}</td>
                <td style={{textAlign:'center'}}>
                  <span className={char.source==='recruitable'?'badge-r':'badge-nr'}
                    style={{padding:'2px 8px',borderRadius:'12px',fontWeight:'bold',fontSize:'11px'}}>
                    {label(char)}
                  </span>
                </td>
                {[0,1,2,3,4,5].map(idx=>(
                  <td key={idx} style={{textAlign:'center',color:(char.relations||[])[idx]?'#1F4E79':'#BFBFBF',fontSize:'12px'}}>
                    {(char.relations||[])[idx]||'—'}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  function CharIndex() {
    return (
      <div>
        {Object.entries(charIndexGroups).map(([race,chars])=>(
          <div key={race} style={{marginBottom:'16px',borderRadius:'6px',overflow:'hidden',border:'1px solid #D1D9E6'}}>
            <div className="group-hdr" style={{background:RACE_COLORS[race]||'#F5F5F5'}}>
              ▌ {race}
              <span style={{color:'#6B7280',fontWeight:'normal',fontSize:'11px'}}>（{chars.length} 人）</span>
            </div>
            <div className="scroll-x">
              <table style={{minWidth:'500px'}}>
                <thead><tr style={{background:'#2E75B6'}}>{['名字','派系','年齡','職業（棋種）','招募狀態'].map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>
                  {chars.map(char=>(
                    <tr key={char.name}>
                      <td style={{fontWeight:'600'}}>{char.name}</td>
                      <td style={{textAlign:'center',fontSize:'12px'}}>{char.faction}</td>
                      <td style={{textAlign:'center',fontSize:'12px'}}>{char.age}</td>
                      <td style={{textAlign:'center',fontSize:'12px'}}>{char.job}</td>
                      <td style={{textAlign:'center'}}>
                        <span className={char.source==='recruitable'?'badge-r':'badge-nr'}
                          style={{padding:'2px 8px',borderRadius:'12px',fontWeight:'bold',fontSize:'11px'}}>
                          {label(char)}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        ))}
      </div>
    );
  }

  if (characters === null) {
    return (
      <div className="loading-screen">
        <div className="spinner"/>
        <div style={{fontSize:'15px',fontWeight:'bold'}}>連接雲端資料庫中…</div>
        <div style={{fontSize:'12px',color:'#6B7280'}}>首次載入需要幾秒鐘</div>
      </div>
    );
  }

  const TABS   = ['可招募角色','不可招募角色','關聯角色索引','角色索引清單'];
  const COUNTS = [rec.length, nrec.length, allChars.length, allChars.length];

  return (
    <div style={{minHeight:'100vh',background:'#F0F4FB'}}>
      {showAddModal && <AddCharModal allChars={allChars} setChars={setCharacters} onClose={()=>setShowAddModal(false)}/>}

      <div style={{background:'linear-gradient(135deg,#1F4E79,#2E75B6)',color:'white',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px'}}>
        <div>
          <div style={{fontSize:'18px',fontWeight:'bold'}}>🎮 遊戲角色管理系統</div>
          <div style={{fontSize:'12px',opacity:0.8,marginTop:'3px',display:'flex',alignItems:'center',gap:'6px'}}>
            <span className={`sync-dot ${connected?'sync-on':'sync-off'}`}/>
            {connected?'已連接雲端・所有裝置即時同步':'連線中斷，請重新整理'}
            <span style={{opacity:0.6}}>· 共 {allChars.length} 位角色</span>
          </div>
        </div>
        <button className="new-char-btn" onClick={()=>setShowAddModal(true)}>＋ 新增角色</button>
      </div>

      <div style={{background:'white',borderBottom:'2px solid #E5E7EB',display:'flex',overflowX:'auto'}}>
        {TABS.map((label,i)=>(
          <button key={i} className={`tab-btn ${tab===i?'active':''}`} onClick={()=>setTab(i)}>
            {label}
            <span style={{marginLeft:'5px',fontSize:'11px',background:tab===i?'#1F4E79':'#E5E7EB',color:tab===i?'white':'#6B7280',borderRadius:'10px',padding:'1px 7px'}}>
              {COUNTS[i]}
            </span>
          </button>
        ))}
      </div>

      {(tab===0||tab===1)&&(
        <div className="hint-bar">
          <span>💡</span>
          <span>點 <strong>＋</strong> 新增關聯，支援中文搜尋，可招募和不可招募角色都會顯示。點 <strong>×</strong> 刪除關聯。所有操作即時反映並同步至雲端。</span>
        </div>
      )}

      <div style={{padding:'16px'}}>
        {tab===0&&<DataTable chars={rec}/>}
        {tab===1&&<DataTable chars={nrec}/>}
        {tab===2&&<RelationIndex/>}
        {tab===3&&<CharIndex/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
